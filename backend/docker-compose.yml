services:
  db:
    image: postgres:15-alpine
    container_name: xeno-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Dev@11976"
      POSTGRES_DB: xeno
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xeno-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xeno-web
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DEBUG=true
      - DB_USER=postgres
      - DB_PASSWORD=Dev@11976
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=xeno
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xeno-worker
    command: python -m app.workers.tasks
    environment:
      - ENV=development
      - DEBUG=true
      - DB_USER=postgres
      - DB_PASSWORD=Dev@11976
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=xeno
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
